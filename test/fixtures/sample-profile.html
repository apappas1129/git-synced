<!DOCTYPE html>
<html>
<body>
  <table>
    <tr>
      <!-- normal cell with a tooltip that has an explicit contribution count -->
      <td data-date="2024-01-01" data-level="2" id="cell-1"></td>
      <!-- zero-level day: must be skipped entirely -->
      <td data-date="2024-01-02" data-level="0" id="cell-2"></td>
      <!-- cell whose tooltip text has no "N contribution(s)" match: falls back to count 1 -->
      <td data-date="2024-01-03" data-level="1" id="cell-3"></td>
      <!-- another explicit multi-contribution day -->
      <td data-date="2024-01-04" data-level="3" id="cell-4"></td>
      <!-- cell with no matching tool-tip element at all: falls back to count 1 -->
      <td data-date="2024-01-05" data-level="4" id="cell-5"></td>
    </tr>
  </table>
  <tool-tip for="cell-1">3 contributions on January 1st.</tool-tip>
  <tool-tip for="cell-2">No contributions on January 2nd.</tool-tip>
  <tool-tip for="cell-3">Some unrelated tooltip text.</tool-tip>
  <tool-tip for="cell-4">12 contributions on January 4th.</tool-tip>
</body>
</html>
